name: Canonical validation

on:
  workflow_dispatch:
    inputs:
      source-commit:
        description: Exact current dev commit to validate
        required: true
        type: string

permissions:
  contents: read

env:
  ISRAS_RUNNER_IDENTITY: canonical-runner-group

jobs:
  canonical:
    if: github.ref == 'refs/heads/dev'
    runs-on:
      - self-hosted
      - isras-canonical
      - disposable
    timeout-minutes: 180
    environment: canonical-acceptance

    steps:
      - name: Refuse pull-request, stale, or non-dev execution
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
          test "${{ inputs.source-commit }}" = "$GITHUB_SHA"
          test "$GITHUB_REF" = "refs/heads/dev"

      - name: Create a clean exact-commit checkout
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
          ISRAS_SOURCE_COMMIT: ${{ inputs.source-commit }}
        run: |
          set -Eeuo pipefail
          test -n "$GITHUB_WORKSPACE"
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          cd "$GITHUB_WORKSPACE"
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.extraheader=AUTHORIZATION: basic ${auth}" \
            fetch --no-tags --depth=1 origin refs/heads/dev
          test "$(git rev-parse FETCH_HEAD)" = "$ISRAS_SOURCE_COMMIT"
          git checkout --detach "$ISRAS_SOURCE_COMMIT"
          test "$(git rev-parse HEAD)" = "$ISRAS_SOURCE_COMMIT"
          test -z "$(git status --porcelain)"
          unset auth ISRAS_GITHUB_TOKEN

      - name: Run canonical validation
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x tools/validation/validate_canonical.sh
          ./tools/validation/validate_canonical.sh

      - name: Refuse a dirty post-validation tree
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -z "$(git status --porcelain)"

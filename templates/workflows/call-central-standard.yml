name: ISRAS validation

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy:
    uses: Iron-Signal-Systems/engineering-standards/.github/workflows/reusable-policy-validation.yml@STANDARD_FULL_COMMIT_SHA
  portable:
    uses: Iron-Signal-Systems/engineering-standards/.github/workflows/reusable-portable-validation.yml@STANDARD_FULL_COMMIT_SHA
    with:
      validation-command: ./tools/validation/validate_portable.sh

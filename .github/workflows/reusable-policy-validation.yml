name: Reusable ISRAS policy validation

on:
  workflow_call:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact event commit without an external action
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.extraheader=AUTHORIZATION: basic ${auth}" \
            fetch --no-tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          unset auth ISRAS_GITHUB_TOKEN

      - name: Install pinned ISRAS validation tools
        shell: bash
        run: python3 -m pip install --disable-pip-version-check --requirement tools/requirements.txt

      - name: Validate repository assurance policy
        shell: bash
        run: python3 tools/isras/validate_policy.py --repo-root .

name: Reusable ISRAS portable validation

on:
  workflow_call:
    inputs:
      validation-command:
        description: Repository-owned portable validation command
        required: false
        type: string
        default: ./tools/validation/validate_portable.sh
      runner:
        description: GitHub-hosted runner label
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  portable:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    steps:
      - name: Check out exact event commit without an external action
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.extraheader=AUTHORIZATION: basic ${auth}" \
            fetch --no-tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          unset auth ISRAS_GITHUB_TOKEN
      - name: Run repository-owned validation
        shell: bash
        env:
          ISRAS_VALIDATION_COMMAND: ${{ inputs.validation-command }}
        run: |
          set -Eeuo pipefail
          case "$ISRAS_VALIDATION_COMMAND" in
            ./*) ;;
            *) printf 'Validation command must be a repository-relative path.\n' >&2; exit 2 ;;
          esac
          chmod +x "$ISRAS_VALIDATION_COMMAND"
          "$ISRAS_VALIDATION_COMMAND"

name: Reusable ISRAS portable validation

on:
  workflow_call:
    inputs:
      validation-command:
        description: Repository-owned portable validation command
        required: false
        type: string
        default: ./tools/validation/validate_portable.sh

permissions:
  contents: read

jobs:
  portable:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out exact event commit without an external action
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git init .
          git config core.autocrlf false
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.extraheader=AUTHORIZATION: basic ${auth}" \
            fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          unset auth ISRAS_GITHUB_TOKEN

      - name: Acquire and verify required historical validation commits
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          export ISRAS_GIT_HTTP_EXTRAHEADER="AUTHORIZATION: basic ${auth}"
          python3 -I tools/isras/prepare_portable_history.py \
            --repo-root "$PWD" \
            --remote origin
          unset auth ISRAS_GIT_HTTP_EXTRAHEADER ISRAS_GITHUB_TOKEN

      - name: Create pinned ISRAS tool environment
        shell: bash
        run: |
          chmod +x tools/environment/bootstrap_tools.sh
          ./tools/environment/bootstrap_tools.sh
          echo "ISRAS_PYTHON=$PWD/.isras-tools-venv/bin/python" >> "$GITHUB_ENV"

      - name: Run repository-owned validation with structured diagnostics
        shell: bash
        env:
          ISRAS_VALIDATION_COMMAND: ${{ inputs.validation-command }}
        run: |
          set -Eeuo pipefail
          case "$ISRAS_VALIDATION_COMMAND" in
            ./*) ;;
            *)
              printf 'FAIL: validation command must be a repository-relative path\n' >&2
              printf 'failure_code=ISRAS-PORTABLE-WORKFLOW-001\n' >&2
              printf 'observed=%s\n' "$ISRAS_VALIDATION_COMMAND" >&2
              exit 2
              ;;
          esac
          test -f "$ISRAS_VALIDATION_COMMAND" || {
            printf 'FAIL: repository-owned validation command is missing\n' >&2
            printf 'failure_code=ISRAS-PORTABLE-WORKFLOW-002\n' >&2
            printf 'observed=%s\n' "$ISRAS_VALIDATION_COMMAND" >&2
            exit 2
          }
          chmod +x "$ISRAS_VALIDATION_COMMAND"
          "$ISRAS_VALIDATION_COMMAND"

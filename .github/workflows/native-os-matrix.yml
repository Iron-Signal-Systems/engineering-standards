name: Native portable OS matrix

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Check out exact event commit on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.extraheader=AUTHORIZATION: basic ${auth}" \
            fetch --no-tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Check out exact event commit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY.git"
          $pair = "x-access-token:$env:ISRAS_GITHUB_TOKEN"
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          git -c "http.extraheader=AUTHORIZATION: basic $auth" `
            fetch --no-tags --depth=1 origin "$env:GITHUB_REF"
          git checkout --detach FETCH_HEAD
          if ((git rev-parse HEAD) -ne $env:GITHUB_SHA) { throw "Commit mismatch." }

      - name: Install pinned ISRAS validation tools on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        run: python3 -m pip install --disable-pip-version-check --requirement tools/requirements.txt

      - name: Install pinned ISRAS validation tools on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: python -m pip install --disable-pip-version-check --requirement tools/requirements.txt

      - name: Install pinned ISRAS validation tools on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        run: python3 -m pip install --disable-pip-version-check --requirement tools/requirements.txt

      - name: Install pinned ISRAS validation tools on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: python -m pip install --disable-pip-version-check --requirement tools/requirements.txt

      - name: Run portable validation on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x tools/validation/validate_portable.sh
          ./tools/validation/validate_portable.sh

      - name: Run portable validation on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\tools\validation\Validate-Portable.ps1

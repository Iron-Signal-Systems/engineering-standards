name: Native portable OS matrix

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Check out exact event commit on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git init .
          git config core.autocrlf false
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.extraheader=AUTHORIZATION: basic ${auth}" \
            fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          unset auth ISRAS_GITHUB_TOKEN

      - name: Check out exact event commit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .
          git config core.autocrlf false
          git config core.eol lf
          git remote add origin "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY.git"
          $pair = "x-access-token:$env:ISRAS_GITHUB_TOKEN"
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          git -c "http.extraheader=AUTHORIZATION: basic $auth" `
            fetch --no-tags --depth=1 origin "$env:GITHUB_SHA"
          if ($LASTEXITCODE -ne 0) {
              Write-Error "FAIL: exact event commit fetch failed"
              Write-Error "failure_code=ISRAS-PORTABLE-CHECKOUT-001"
              Write-Error "required_commit=$env:GITHUB_SHA"
              Write-Error "exit_code=$LASTEXITCODE"
              exit $LASTEXITCODE
          }
          git checkout --detach "$env:GITHUB_SHA"
          if ($LASTEXITCODE -ne 0) {
              Write-Error "FAIL: exact event commit checkout failed"
              Write-Error "failure_code=ISRAS-PORTABLE-CHECKOUT-002"
              Write-Error "required_commit=$env:GITHUB_SHA"
              Write-Error "exit_code=$LASTEXITCODE"
              exit $LASTEXITCODE
          }
          Remove-Item Env:ISRAS_GITHUB_TOKEN -ErrorAction SilentlyContinue

      - name: Acquire and verify required historical commits on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          auth="$(printf 'x-access-token:%s' "$ISRAS_GITHUB_TOKEN" | base64 | tr -d '\n')"
          export ISRAS_GIT_HTTP_EXTRAHEADER="AUTHORIZATION: basic ${auth}"
          python3 -I tools/isras/prepare_portable_history.py \
            --repo-root "$PWD" \
            --remote origin
          unset auth ISRAS_GIT_HTTP_EXTRAHEADER ISRAS_GITHUB_TOKEN

      - name: Acquire and verify required historical commits on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ISRAS_GITHUB_TOKEN: ${{ github.token }}
        run: |
          $pair = "x-access-token:$env:ISRAS_GITHUB_TOKEN"
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $env:ISRAS_GIT_HTTP_EXTRAHEADER = "AUTHORIZATION: basic $auth"
          python -I tools/isras/prepare_portable_history.py `
            --repo-root "$PWD" `
            --remote origin
          $code = $LASTEXITCODE
          Remove-Item Env:ISRAS_GIT_HTTP_EXTRAHEADER -ErrorAction SilentlyContinue
          Remove-Item Env:ISRAS_GITHUB_TOKEN -ErrorAction SilentlyContinue
          if ($code -ne 0) { exit $code }

      - name: Create pinned tool environment on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x tools/environment/bootstrap_tools.sh
          ./tools/environment/bootstrap_tools.sh
          echo "ISRAS_PYTHON=$PWD/.isras-tools-venv/bin/python" >> "$GITHUB_ENV"

      - name: Create pinned tool environment on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\tools\environment\Bootstrap-Tools.ps1
          $python = Join-Path $PWD ".isras-tools-venv\Scripts\python.exe"
          "ISRAS_PYTHON=$python" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run portable validation on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x tools/validation/validate_portable.sh
          ./tools/validation/validate_portable.sh

      - name: Run portable validation on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\tools\validation\Validate-Portable.ps1

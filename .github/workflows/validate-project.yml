name: ISRAS Reusable Project Validation

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: Validate pinned project
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out consuming project at the exact caller commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: target
          persist-credentials: false

      - name: Check out the exact called ISRAS workflow source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: standard
          persist-credentials: false

      - name: Configure pinned Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: standard/go.mod
          cache: false

      - name: Establish release-bound SSH signer trust
        shell: bash
        run: |
          set -Eeuo pipefail
          standard/tools/configure-hosted-ssh-signing-trust.sh \
            --target "$GITHUB_WORKSPACE/target" \
            --runtime-root "$RUNNER_TEMP/isras-ssh-trust"

      - name: Build exact-source bootstrap verifier
        shell: bash
        run: |
          set -Eeuo pipefail
          version="$(tr -d '[:space:]' < standard/VERSION)"
          source_commit="${{ job.workflow_sha }}"
          workflow_repository="${{ job.workflow_repository }}"
          release_tag="isras-v${version}"
          test "$workflow_repository" = "Iron-Signal-Systems/engineering-standards"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$source_commit" =~ ^[0-9a-f]{40}$ ]]
          (
            cd standard
            go build \
              -mod=readonly \
              -trimpath \
              -buildvcs=false \
              -ldflags "-s -w -buildid= \
                -X=github.com/Iron-Signal-Systems/engineering-standards/internal/validatoridentity.releaseVersion=${version} \
                -X=github.com/Iron-Signal-Systems/engineering-standards/internal/validatoridentity.releaseTag=${release_tag} \
                -X=github.com/Iron-Signal-Systems/engineering-standards/internal/validatoridentity.releaseSourceCommit=${source_commit}" \
              -o "$RUNNER_TEMP/isras-bootstrap" \
              ./cmd/isras-validate
          )
          "$RUNNER_TEMP/isras-bootstrap" version

      - name: Bootstrap-validate committed pin and release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          "$RUNNER_TEMP/isras-bootstrap" \
            --repo "$GITHUB_WORKSPACE/target" \
            --mode commit \
            project-pin validate
          "$RUNNER_TEMP/isras-bootstrap" \
            --repo "$GITHUB_WORKSPACE/target" \
            --mode commit \
            project-pin verify-artifacts

      - name: Acquire and digest-bind the published release validator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          release_directory="$RUNNER_TEMP/isras-release"
          mkdir -p "$release_directory"
          mapfile -t values < <(
            python3 - <<'PY'
          import json
          from pathlib import Path

          pin = json.loads(Path("target/.isras/project.json").read_text(encoding="utf-8"))
          evidence = json.loads(Path("target/.isras/adoption-verification.json").read_text(encoding="utf-8"))
          standard = pin["standard"]
          if standard["source_repository"] != "github.com/Iron-Signal-Systems/engineering-standards":
              raise SystemExit("unexpected standards source repository")
          if evidence["release_tag"] != standard["release_tag"] or evidence["source_commit"] != standard["source_commit"]:
              raise SystemExit("adoption evidence identity does not match the project pin")
          validators = [
              artifact for artifact in pin["artifacts"]
              if artifact["kind"] == "validator"
              and artifact.get("os") == "linux"
              and artifact.get("arch") == "amd64"
          ]
          if len(validators) != 1:
              raise SystemExit("pin must declare exactly one linux/amd64 validator")
          artifact = validators[0]
          evidence_matches = [item for item in evidence["artifacts"] if item["name"] == artifact["name"]]
          if len(evidence_matches) != 1:
              raise SystemExit("adoption evidence must contain exactly one matching validator")
          recorded = evidence_matches[0]
          if recorded["sha256"] != artifact["sha256"] or recorded["sha512"] != artifact["sha512"]:
              raise SystemExit("adoption evidence validator digests do not match the project pin")
          if recorded["size"] != recorded["remote_size"] or recorded["size"] <= 0:
              raise SystemExit("adoption evidence validator size is invalid")
          print(standard["release_tag"])
          print(artifact["name"])
          print(recorded["size"])
          print(artifact["sha256"])
          print(artifact["sha512"])
          PY
          )
          test "${#values[@]}" -eq 5
          release_tag="${values[0]}"
          asset_name="${values[1]}"
          expected_size="${values[2]}"
          expected_sha256="${values[3]}"
          expected_sha512="${values[4]}"
          test "$asset_name" = "isras-validator-linux-amd64"
          gh release download "$release_tag" \
            --repo Iron-Signal-Systems/engineering-standards \
            --dir "$release_directory" \
            --pattern "$asset_name"
          validator="$release_directory/$asset_name"
          test -f "$validator"
          test "$(stat -c '%s' "$validator")" = "$expected_size"
          test "$(sha256sum "$validator" | awk '{print $1}')" = "$expected_sha256"
          test "$(sha512sum "$validator" | awk '{print $1}')" = "$expected_sha512"
          chmod 0755 "$validator"
          printf 'ISRAS_RELEASE_VALIDATOR=%s\n' "$validator" >> "$GITHUB_ENV"

      - name: Confirm published validator identity
        shell: bash
        run: |
          set -Eeuo pipefail
          "$ISRAS_RELEASE_VALIDATOR" version

      - name: Validate repository and secret-protection boundaries
        shell: bash
        run: |
          set -Eeuo pipefail
          "$ISRAS_RELEASE_VALIDATOR" \
            --repo "$GITHUB_WORKSPACE/target" \
            --mode commit \
            repo
          "$ISRAS_RELEASE_VALIDATOR" \
            --repo "$GITHUB_WORKSPACE/target" \
            --mode commit \
            secrets

      - name: Revalidate pin and release with the published validator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          "$ISRAS_RELEASE_VALIDATOR" \
            --repo "$GITHUB_WORKSPACE/target" \
            --mode commit \
            project-pin validate
          "$ISRAS_RELEASE_VALIDATOR" \
            --repo "$GITHUB_WORKSPACE/target" \
            --mode commit \
            project-pin verify-artifacts

      - name: Install exact pinned govulncheck
        shell: bash
        run: |
          set -Eeuo pipefail
          govulncheck_module="$(
            python3 -c 'import json; print(json.load(open("standard/validation/tool-versions.json", encoding="utf-8"))["tools"]["govulncheck"]["module"])'
          )"
          govulncheck_version="$(
            python3 -c 'import json; print(json.load(open("standard/validation/tool-versions.json", encoding="utf-8"))["tools"]["govulncheck"]["version"])'
          )"
          test "$govulncheck_module" = "golang.org/x/vuln/cmd/govulncheck"
          [[ "$govulncheck_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

          tool_root="$RUNNER_TEMP/isras-tools"
          for candidate in \
            "$tool_root" \
            "$tool_root/bin" \
            target/.local \
            target/.local/isras \
            target/.local/isras/runtime
          do
            test ! -L "$candidate"
          done

          mkdir -p \
            "$tool_root/bin" \
            target/.local/isras/runtime

          test -d "$tool_root/bin"
          test -d target/.local/isras/runtime

          install -m 0600 \
            standard/validation/tool-versions.json \
            target/.local/isras/runtime/tool-versions.json

          cmp -s \
            standard/validation/tool-versions.json \
            target/.local/isras/runtime/tool-versions.json
          (
            cd target
            GOTOOLCHAIN=local \
              GOENV=off \
              GOBIN="$tool_root/bin" \
              go install \
              "${govulncheck_module}@${govulncheck_version}"
          )

          selected_go="$(command -v go)"
          test -n "$selected_go"
          tool_path="$tool_root/bin/govulncheck"
          test -x "$tool_path"

          build_info="$RUNNER_TEMP/isras-govulncheck-build-info.txt"
          GOTOOLCHAIN=local \
            GOENV=off \
            "$selected_go" version -m "$tool_path" |
            tee "$build_info"

          python3 - \
            "$govulncheck_module" \
            "$govulncheck_version" \
            "$build_info" <<'PY'
          import sys
          from pathlib import Path

          command_path, expected_version, info_path = sys.argv[1:]
          module_root = command_path.split("/cmd/", 1)[0]
          observed_path = ""
          observed_module = ""
          observed_version = ""

          for raw in Path(info_path).read_text(encoding="utf-8").splitlines():
              fields = raw.lstrip().split("\t")
              if len(fields) >= 2 and fields[0] == "path":
                  observed_path = fields[1]
              if len(fields) >= 3 and fields[0] == "mod":
                  observed_module = fields[1]
                  observed_version = fields[2]

          if observed_path != command_path:
              raise SystemExit(
                  f"unexpected govulncheck command path: {observed_path!r}"
              )
          if observed_module != module_root:
              raise SystemExit(
                  f"unexpected govulncheck module: {observed_module!r}"
              )
          if observed_version != expected_version:
              raise SystemExit(
                  f"unexpected govulncheck version: {observed_version!r}"
              )
          PY

          printf '%s\n' "$tool_root/bin" \
            >> "$GITHUB_PATH"
          printf 'ISRAS_GOVULNCHECK_EXECUTABLE=%s\n' "$tool_path" \
            >> "$GITHUB_ENV"

      - name: Run every committed project command
        shell: bash
        run: |
          set -Eeuo pipefail
          mapfile -t commands < <(
            python3 - <<'PY'
          import json
          from pathlib import Path

          pin = json.loads(Path("target/.isras/project.json").read_text(encoding="utf-8"))
          for name in sorted(pin["commands"]):
              print(name)
          PY
          )
          test "${#commands[@]}" -gt 0
          for command_name in "${commands[@]}"; do
            "$ISRAS_RELEASE_VALIDATOR" \
              --repo "$GITHUB_WORKSPACE/target" \
              --mode commit \
              project-command run "$command_name"
          done

      - name: Retain ISRAS validation evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: isras-evidence-${{ github.run_id }}
          path: |
            target/.local/isras
            target/.local/validation
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 30
